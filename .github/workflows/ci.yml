# ═══════════════════════════════════════════════════════════════════════════════
# CI/CD Pipeline — Pawon Salam
# Full Test Suite: Unit → Integration → Playwright E2E → Cypress E2E
#
# Jobs:
#   1. unit-tests       : Jest unit + integration tests
#   2. playwright-e2e   : Playwright Real-API E2E (needs: unit-tests)
#   3. cypress-e2e      : Cypress Mocked-API E2E  (needs: unit-tests)
#
# Note: playwright.yml dipertahankan sebagai backup terpisah.
# ═══════════════════════════════════════════════════════════════════════════════
name: "🚀 CI Full Test Suite — Pawon Salam"

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

# Global env — Pawon Salam Supabase credentials
env:
  VITE_SUPABASE_URL: "https://pbitlwrgainrcippjuwd.supabase.co"
  VITE_SUPABASE_ANON_KEY: "sb_publishable_4fJEkMwBlAmMjBez-6KgXA_eAXRMdsJ"
  VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_4fJEkMwBlAmMjBez-6KgXA_eAXRMdsJ"
  NODE_ENV: "test"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Unit Tests + Integration Tests (Jest)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 Unit & Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "🔄 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js LTS"
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧪 Run Jest unit tests"
        run: npm test -- --ci --passWithNoTests --forceExit
        env:
          CI: true

      - name: "🔗 Run integration tests"
        run: npm run test:integration -- --ci --passWithNoTests --forceExit
        env:
          CI: true

      - name: "📊 Upload Jest coverage report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-pawon
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Playwright E2E Tests (Real-API)
  # ─────────────────────────────────────────────────────────────────────────────
  playwright-e2e:
    name: "🎭 Playwright E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - name: "🔄 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js LTS"
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🎭 Install Playwright browsers"
        run: npx playwright install --with-deps chromium

      - name: "📝 Create .env for Playwright (Real-API)"
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" >> .env

      - name: "🚀 Run Playwright E2E tests"
        run: npx playwright test mock-fallback.spec.ts
        env:
          CI: true

      - name: "📊 Upload Playwright report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pawon
          path: playwright-report/
          retention-days: 14

      - name: "📸 Upload Playwright test results on failure"
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-pawon
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Cypress E2E Tests (Mocked-API)
  # ─────────────────────────────────────────────────────────────────────────────
  cypress-e2e:
    name: "🌲 Cypress E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - name: "🔄 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js LTS"
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "📝 Create .env for Cypress (Mocked-API)"
        run: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY" >> .env
          echo "VITE_USE_MOCK_API=true" >> .env

      - name: "🏗️ Build app for Cypress"
        run: npm run build

      - name: "🌲 Run Cypress E2E tests"
        uses: cypress-io/github-action@v6
        with:
          start: npx vite preview --port 5173
          wait-on: "http://localhost:5173"
          wait-on-timeout: 60
          command: npm run test:e2e:cypress
          browser: chrome
        env:
          CYPRESS_VERIFY_TIMEOUT: "120000"
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: "📸 Upload Cypress screenshots on failure"
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-pawon
          path: cypress/screenshots/
          retention-days: 7

      - name: "🎬 Upload Cypress videos"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-pawon
          path: cypress/videos/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Summary notification (semua tests selesai)
  # ─────────────────────────────────────────────────────────────────────────────
  ci-summary:
    name: "✅ CI Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests, playwright-e2e, cypress-e2e]
    if: always()

    steps:
      - name: "📋 Report CI status"
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║   CI Full Test Suite — Pawon Salam           ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Unit Tests      : ${{ needs.unit-tests.result }}"
          echo "║  Playwright E2E  : ${{ needs.playwright-e2e.result }}"
          echo "║  Cypress E2E     : ${{ needs.cypress-e2e.result }}"
          echo "╚══════════════════════════════════════════════╝"

      - name: "❌ Fail if any job failed"
        if: >
          needs.unit-tests.result == 'failure' ||
          needs.playwright-e2e.result == 'failure' ||
          needs.cypress-e2e.result == 'failure'
        run: |
          echo "One or more test jobs failed. See details above."
          exit 1
